name: Validate Pi setup

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: bash -n install.sh

  windows-powershell-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $parseErrors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $_.FullName), [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) { throw "$($_.FullName): $($parseErrors | Out-String)" }
          }
      - name: Test Windows Nerd Font setup
        shell: pwsh
        run: ./tests/setup-terminal-font.test.ps1
