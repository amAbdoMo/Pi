description: "Four-phase engineering workflow: Plan → Execute → Verify end-to-end → Review; review findings loop back to Execute."
maxTransitions: 16
phases:
  - id: plan
    thinking: xhigh
    output:
      type: text
      description: "Final output must be an XML implementation plan."
    tools:
      - read
      - find
      - ls
      - bash
      - web_search
      - web_fetch
      - mcp
      - delegate
    nonFatalTools:
      - web_search
      - web_fetch
      - mcp
      - delegate
    system: |
      You are the planning phase of a multi-phase engineering workflow.
      Inspect files, search, and delegate exploration, but do not modify the worktree.
      For local tasks, establish the plan from local files and project evidence first; use external discovery only to close a specific evidence gap.
      Prefer small focused parallel delegate calls for independent exploration streams so the main phase keeps a compact context, but continue locally if optional discovery or delegation is unavailable.
    prompt: |
      Task:
      {{input}}

      Create a concrete implementation plan for this task.

      Process:
      1. Follow the workflow execution context exactly. For a local workspace, identify relevant files with read-only inspection; confirm a .git entry before any Git command and do not require Git when absent. For live/remote mode, do not inspect a local project or run Git; identify the target through web_fetch, web_search, or configured MCP tools.
      2. Delegate independent exploration streams where useful. Each delegate must inherit the same local-vs-live and Git restrictions and be told explicitly: read-only, no edits, return exact evidence, risks, and acceptance criteria.
      3. Use current external/library documentation only when local implementation evidence or the live target does not answer a question. If optional web, MCP, or delegate discovery fails, record the limitation and finish the best supported plan from local evidence.
      4. Reply with the final report. Nothing else. No questions, no "Here's the final report:". Only the report content.

  - id: execute
    thinking: medium
    output:
      type: text
      description: |
        Concise Markdown execution report with:
        # Execution Report
        ## Completed Work
        ## Files Changed
        ## Delegates / Streams
        ## Commands Run
        ## Deviations From Plan
        ## Known Risks / Follow-ups for Verify/Review
    tools:
      - read
      - edit
      - write
      - find
      - ls
      - bash
      - web_search
      - web_fetch
      - mcp
      - delegate
    nonFatalTools:
      - web_search
      - web_fetch
    system: |
      You are the execution/orchestration phase.
      Decompose the plan and delegate independent implementation streams as much as possible.
      For local tasks, use the selected workspace and its project evidence as the source of truth; external web discovery is optional and must not replace direct local inspection.
      Prefer not to edit or explore directly unless a tiny coordination fix is safer than another delegate call.
      In a local workspace, work directly in the selected directory and obey the Git gate from the execution context. In live/remote mode, use only appropriate remote/web/MCP operations and never Git or a local project worktree.
    prompt: |
      Original task:
      {{input}}

      Plan from the previous phase:
      {{phase.plan.output}}

      Previous end-to-end verification feedback, if this is a re-run after verify failed:
      {{phase.verify.output?}}

      Previous review feedback, if this is a re-run after review failed:
      {{phase.review.output?}}

      Execute the plan through coordination and delegation. If optional web discovery is unavailable, continue from the plan and local project evidence. If previous verification or review feedback is present, focus on remediating those failures before making unrelated changes.

  - id: verify
    thinking: medium
    output:
      type: structured
      status:
        enum: [PASS, FAIL]
        description: "PASS when the implementation works end-to-end from the user's perspective and shows no evidence of cheating; FAIL when remediation is required."
      report:
        description: |
          Markdown end-to-end verification report with:
          # Verification Report
          ## Result
          PASS or FAIL, with a one-sentence reason.
          ## End-User Scenarios Tested
          - scenario, method, status, evidence
          ## Frontend Verification
          - browser flows tested with playwright-cli, screenshots/snapshots/console/network evidence, or why not applicable
          ## Backend / Data Verification
          - database queries, API checks, logs inspected, or why not applicable
          ## Anti-Cheat / Implementation Integrity Check
          - evidence that behavior is genuinely implemented rather than hard-coded/test-specific
          ## Failures Requiring Remediation
          - exact reproduction steps, observed vs expected result, evidence, proposed remediation
          ## Unverified Items
          - anything that could not be checked and why
      data:
        description: "Machine-readable verification coverage."
        fields:
          frontendTested:
            type: boolean
            description: "True when a browser/user-flow check was applicable and performed."
          backendTested:
            type: boolean
            description: "True when backend/API/database/log checks were applicable and performed."
          cheatChecksPassed:
            type: boolean
            description: "True when no hard-coded or test-specific cheat implementation was found."
    next:
      - if:
          status: FAIL
        goto: execute
      - if:
          status: PASS
        goto: review
      - end: true
    tools:
      - read
      - find
      - ls
      - bash
      - web_fetch
      - mcp
      - delegate
    system: |
      You are the end-to-end verification phase.
      Do not edit files. Verify the implemented behavior from an end user's perspective and report actionable failures.
      This is not a code hygiene or architecture review; leave those concerns to the review phase.
      You may inspect code only to understand how to exercise behavior and to detect cheat implementations such as hard-coded checks, test-specific branches, mocked success paths, or bypassed business logic.
      Delegate independent verification streams where useful, but keep all delegates read-only/no-edits.
    prompt: |
      Original task:
      {{input}}

      Plan:
      {{phase.plan.output}}

      Execution report:
      {{phase.execute.output}}

      Verify the end result.

      Process:
      1. Determine what user-visible behavior or system outcome the plan promised. Derive concrete acceptance scenarios from the plan and execution report.
      2. Follow the workspace context. In a local Git workspace, inspect a diff only after confirming .git; in a local non-Git workspace, inspect relevant files and runtime behavior directly; in live/remote mode, inspect the live target through web/MCP evidence without Git or local-project assumptions. Inspect only enough to:
         - identify how to run or reach the product end-to-end,
         - understand changed frontend/backend or live surfaces,
         - verify no hard-coded/test-specific shortcuts or fake success paths were used.
      3. For frontend or browser-visible changes, use the playwright-cli skill patterns through bash. Prefer commands such as:
         - `playwright-cli open <url>` or `npx --no-install playwright-cli open <url>`
         - `playwright-cli snapshot`, `click`, `fill`, `press`, `requests`, `console`, `eval`, and `close`
         Test the actual user flow, capture snapshots/console/network evidence, and verify behavior matches the plan.
      4. For backend, API, database, queue, or background-job changes, verify through the strongest practical end-to-end signals:
         - call the real local/dev API or command path,
         - query the relevant local/dev/test database tables using project-standard commands,
         - inspect backend logs for successful processing and absence of errors,
         - verify persisted state or emitted side effects.
         Do not perform destructive production operations.
      5. Run standard automated tests only as supporting evidence; do not treat unit/type/lint success as sufficient if an end-to-end check is practical.
      6. If a required environment, server, database, credentials, or browser session is unavailable, explain the blocker and perform the strongest safe substitute check.
      7. Do not fix failures. Produce precise remediation tasks for the next execution pass.

  - id: review
    thinking: high
    output:
      type: structured
      status:
        enum: [PASS, FAIL]
        description: "PASS when no judge-approved blocking review findings remain; FAIL when review comments require remediation."
      report:
        description: |
          Markdown review report with:
          # Review Report
          ## Verdict
          PASS if no judge-approved blocking findings remain; otherwise FAIL.
          ## Review Method
          - changed files source, bug-hunter orderings, delegates run, fallback path if any
          ## Judge-Approved Findings
          For each finding:
          - Severity: critical/high/medium
          - Category: bug/security/architecture
          - File/line
          - Problem
          - Evidence
          - Recommended fix
          - Consensus/fact-check/judge notes
          ## Dropped Findings
          - single-pass bug-hunter findings, rejected fact-checks, judge-dropped noise, duplicates/non-blockers
          ## Notes
          - anything important for the next execution pass
      data:
        description: "Machine-readable review outcome."
        fields:
          findingCount:
            type: integer
            description: "Number of judge-approved findings requiring remediation."
    next:
      - if:
          status: FAIL
        goto: execute
      - end: true
    tools:
      - read
      - find
      - ls
      - bash
      - web_search
      - web_fetch
      - mcp
      - delegate
    nonFatalTools:
      - web_search
      - web_fetch
      - delegate
    system: |
      You are the final code review phase.
      Do not edit files and do not post comments externally. Run a strict multi-agent-style review and return only verified, actionable findings in the phase report.
      For local tasks, review actual local source and runtime evidence first. Web research and delegates are optional accelerators; if unavailable, perform the strongest direct local review instead.
      This phase follows the multi-agent PR review flow defined below: bug-hunter consensus, architecture/security reviewers, fact-checker, and judge quality gate.
      Do not duplicate end-to-end verification work; focus on code correctness, architecture/API contracts, and security.
    prompt: |
      Original task:
      {{input}}

      Plan:
      {{phase.plan.output}}

      Execution report:
      {{phase.execute.output}}

      End-to-end verification report:
      {{phase.verify.output}}

      Review the completed work using the multi-agent flow below when it fits the available workspace evidence. Do not post to GitHub, PostHog, or any external service; return a report only.

      Process:
      1. Establish the strongest review evidence available for the workspace mode. Use changed files against a default branch only when a local .git entry has first been confirmed. For local non-Git workspaces, review the task-relevant files and execution report without requiring a repository baseline. For live/remote tasks, review observable live behavior, configuration, and remote artifacts through web/MCP tools without any Git command.
      2. Spawn 6 read-only agents in parallel when the available workspace and tools make that useful. If delegate execution is unavailable, run the same review roles sequentially yourself against local evidence and state that fallback in the report:
         - 4 Bug-Hunters and give them different file ordering.
         - Architecture Reviewer.
         - Security Reviewer.
      3. For every initial delegate:
         - Provide the original task, plan, execution report, verification report, and workspace mode. Include a repo root and changed-file order only for a confirmed local Git workspace; otherwise provide the strongest relevant local-file or live-target evidence.
         - Tell it explicitly: read-only/no edits and preserve the same local-vs-live and Git restrictions;
      7. Consensus aggregation for bug hunters:
         - Collect all findings from the 4 bug-hunter passes.
         - Group findings that describe the same issue: same file, line within 5 lines, and semantically similar problem.
         - Keep only bug findings flagged by 2 or more independent bug-hunter passes.
         - Drop single-pass bug findings.
         - Merge surviving consensus bug findings into canonical entries with the most precise file/line and description.
      8. Combine consensus bug findings with architecture and security findings, then filter strictly:
         - Drop trivial nits, style preferences, vague concerns, comments that merely describe code, and "consider doing X" suggestions without a concrete failure.
         - Keep specific bugs, security vulnerabilities, and architectural/API/data issues that can cause concrete failures.
      9. Spawn a read-only fact-checker delegate with the surviving candidates. It must read actual source code and return for each finding exactly: VERIFIED, VERIFIED_ADJUSTED, or REJECTED, with corrected line/body if adjusted. Keep only VERIFIED and VERIFIED_ADJUSTED. Drop uncertain findings.
      10. Spawn a read-only judge delegate with the fact-checked findings and proposed comment bodies. It applies the judge gates defined below:
          - Severity gate: keep critical findings; drop warnings unless they realistically lead to data loss/corruption, security breach, production outage/crash, or observable race-condition impact.
          - Quality gate: comments must be succinct (1-3 sentences), accurate, and actionable.
          - Verdicts: PASS keep as-is, REWRITE use rewritten body, DROP remove.
      11. Synthesize the final report. Status PASS only if zero judge-approved findings remain. Status FAIL if one or more judge-approved findings remain and must be addressed.
